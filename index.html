<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AskQUEST</title>
<style>
  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --surface2: #f0f2f7;
    --border: #e4e7ef;
    --border2: #cbd0df;
    --text: #0f1523;
    --text2: #5a637a;
    --text3: #9198ae;
    --accent: #2f54eb;
    --accent-light: #e8eeff;
    --accent2: #722ed1;
    --user-bubble: #2f54eb;
    --user-text: #ffffff;
    --bot-bubble: #f0f2f7;
    --bot-text: #0f1523;
    --danger: #cf1322;
    --danger-bg: #fff1f0;
    --success: #389e0d;
    --success-bg: #f6ffed;
    --warn: #d46b08;
    --warn-bg: #fff7e6;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,.07);
    --sidebar-w: 280px;
  }
  [data-theme="dark"] {
    --bg: #0d1117;
    --surface: #161b27;
    --surface2: #1e2535;
    --border: #2a3249;
    --border2: #3a4562;
    --text: #e8ecf5;
    --text2: #8d97b5;
    --text3: #5a637a;
    --accent: #4e7eff;
    --accent-light: #1a2545;
    --accent2: #9254de;
    --user-bubble: #2f54eb;
    --user-text: #fff;
    --bot-bubble: #1e2535;
    --bot-text: #e8ecf5;
    --danger: #ff4d4f;
    --danger-bg: #2a1215;
    --success: #52c41a;
    --success-bg: #162312;
    --warn: #fa8c16;
    --warn-bg: #2b1d09;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  /* ─── ROLE GATE ─── */
  #gate {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .gate-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 40px 48px; text-align: center; width: 100%; max-width: 440px;
    box-shadow: var(--shadow);
  }
  .gate-logo {
    width: 52px; height: 52px; border-radius: 14px; background: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 20px; letter-spacing: -1px;
  }
  .gate-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
  .gate-sub { color: var(--text2); margin-bottom: 32px; font-size: 13px; }
  .gate-btns { display: flex; gap: 12px; justify-content: center; }
  .gate-btn {
    flex: 1; padding: 14px 0; border-radius: var(--radius); border: 1.5px solid var(--border2);
    background: var(--surface2); color: var(--text); font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all .18s; display: flex; flex-direction: column;
    align-items: center; gap: 6px;
  }
  .gate-btn:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
  .gate-btn.admin-btn:hover { border-color: var(--accent2); background: #f4ecff; color: var(--accent2); }
  [data-theme="dark"] .gate-btn.admin-btn:hover { background: #1e1232; }
  .gate-btn-icon { font-size: 24px; }
  .gate-btn-label { font-size: 11px; color: var(--text3); font-weight: 400; }
  .gate-btn:hover .gate-btn-label { color: inherit; opacity: .8; }

  /* Admin login overlay */
  .admin-login {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,.5); align-items: center; justify-content: center;
  }
  .admin-login.open { display: flex; }
  .al-card {
    background: var(--surface); border-radius: 20px; padding: 36px 40px;
    width: 360px; border: 1px solid var(--border);
  }
  .al-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .al-input {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--text); font-size: 14px; outline: none; margin-bottom: 12px;
  }
  .al-input:focus { border-color: var(--accent2); }
  .al-btns { display: flex; gap: 10px; margin-top: 8px; }
  .al-submit {
    flex: 1; padding: 10px; border-radius: var(--radius-sm); border: none;
    background: var(--accent2); color: #fff; font-weight: 600; cursor: pointer;
  }
  .al-cancel {
    padding: 10px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border2);
    background: transparent; color: var(--text2); cursor: pointer;
  }
  .al-err { color: var(--danger); font-size: 12px; margin-bottom: 8px; display: none; }

  /* ─── MAIN APP ─── */
  #app { display: none; height: 100vh; overflow: hidden; }
  #app.open { display: flex; }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    overflow: hidden; transition: transform .25s;
  }
  .sidebar-head {
    padding: 16px 16px 12px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-logo {
    width: 34px; height: 34px; border-radius: 10px; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px; color: #fff; letter-spacing: -1px;
  }
  .brand-name { font-weight: 700; font-size: 15px; }
  .brand-role {
    font-size: 10px; color: #fff; padding: 2px 6px; border-radius: 20px;
    background: var(--accent2); font-weight: 600; margin-left: 4px; vertical-align: middle;
  }
  .brand-role.user-role { background: var(--accent); }
  .head-actions { display: flex; gap: 6px; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: transparent; color: var(--text2); cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-size: 16px; transition: all .15s;
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }

  /* Sessions list */
  .sidebar-section { padding: 12px 14px 8px; flex-shrink: 0; }
  .sidebar-section-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text3); margin-bottom: 8px;
  }
  .new-session-btn {
    width: 100%; padding: 8px 12px; border-radius: var(--radius-sm); border: 1.5px dashed var(--border2);
    background: transparent; color: var(--accent); font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all .15s;
  }
  .new-session-btn:hover { background: var(--accent-light); border-color: var(--accent); }
  .sessions-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
  .sessions-list::-webkit-scrollbar { width: 4px; }
  .sessions-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  .session-item {
    padding: 10px 10px; border-radius: var(--radius-sm); cursor: pointer; margin-bottom: 2px;
    border: 1px solid transparent; transition: all .15s; position: relative;
  }
  .session-item:hover { background: var(--surface2); }
  .session-item.active { background: var(--accent-light); border-color: var(--accent); }
  .session-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .session-date { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .session-actions { display: none; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); gap: 4px; }
  .session-item:hover .session-actions, .session-item.active .session-actions { display: flex; }
  .s-act-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 13px; padding: 2px 4px; border-radius: 4px; }
  .s-act-btn:hover { color: var(--danger); background: var(--danger-bg); }

  /* Admin panel in sidebar */
  .admin-panel {
    border-top: 1px solid var(--border); padding: 12px 14px; flex-shrink: 0;
    background: var(--surface2);
  }
  .admin-panel-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    color: var(--accent2); margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }
  .admin-panel-title::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); display: inline-block; }
  .upload-zone {
    border: 1.5px dashed var(--border2); border-radius: var(--radius-sm); padding: 12px;
    text-align: center; color: var(--text2); font-size: 12px; cursor: pointer; transition: all .15s;
    margin-bottom: 8px; position: relative;
  }
  .upload-zone:hover { border-color: var(--accent2); background: #f4ecff; color: var(--accent2); }
  [data-theme="dark"] .upload-zone:hover { background: #1e1232; }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-zone-icon { font-size: 20px; margin-bottom: 4px; }
  .admin-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .adm-btn {
    flex: 1; min-width: 0; padding: 8px 6px; border-radius: var(--radius-sm);
    border: 1px solid var(--border2); background: var(--surface); color: var(--text2);
    font-size: 11px; cursor: pointer; text-align: center; transition: all .15s;
  }
  .adm-btn:hover { border-color: var(--accent2); color: var(--accent2); background: #f4ecff; }
  [data-theme="dark"] .adm-btn:hover { background: #1e1232; }
  .adm-btn.danger:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }
  .adm-msg { font-size: 11px; margin-top: 6px; padding: 6px 8px; border-radius: var(--radius-sm); }
  .adm-msg.err { background: var(--danger-bg); color: var(--danger); }
  .adm-msg.ok { background: var(--success-bg); color: var(--success); }

  /* ─── MAIN CHAT AREA ─── */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

  /* Top bar */
  .topbar {
    padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex;
    align-items: center; gap: 12px; background: var(--surface); flex-shrink: 0;
  }
  .menu-toggle { display: none; }
  .topbar-project { flex: 1; min-width: 0; }
  .topbar-name { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar-id { font-size: 11px; color: var(--text3); font-family: monospace; }
  .topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .lang-select {
    padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--text); font-size: 13px; cursor: pointer;
  }

  /* Ticket bar (admin only) */
  .ticket-bar {
    display: none; padding: 10px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface2); flex-shrink: 0;
  }
  .ticket-bar.show { display: block; }
  .ticket-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .t-input {
    padding: 8px 12px; border: 1px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text); font-size: 13px; outline: none; width: 200px;
  }
  .t-input:focus { border-color: var(--accent); }
  .t-btn {
    padding: 8px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border2);
    background: var(--surface); color: var(--text2); font-size: 13px; cursor: pointer; transition: all .15s;
  }
  .t-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .ticket-card {
    margin-top: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 12px; background: var(--surface);
  }
  .ticket-top { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
  .t-tag { background: var(--text); color: var(--bg); border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
  .t-status { border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: 600; border: 1px solid; }
  .t-status.open { border-color: #faad14; color: #d46b08; background: var(--warn-bg); }
  .t-status.resolved { border-color: #52c41a; color: var(--success); background: var(--success-bg); }
  .t-status.pending { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .t-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; font-size: 12px; }
  .t-grid-item { color: var(--text2); }
  .t-grid-item strong { color: var(--text); display: block; }
  .t-issue-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin: 8px 0 2px; }
  .t-issue-txt { font-size: 13px; }

  /* Chat */
  .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 4px; }
  .chat-area::-webkit-scrollbar { width: 5px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* Empty state */
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; }
  .empty-logo { width: 56px; height: 56px; border-radius: 16px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 16px; }
  .empty-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .empty-sub { color: var(--text2); max-width: 340px; margin-bottom: 24px; font-size: 13px; line-height: 1.6; }
  .suggestions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 560px; }
  .sug-btn {
    padding: 9px 14px; border: 1px dashed var(--border2); border-radius: 20px;
    background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; transition: all .15s;
  }
  .sug-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  /* Messages */
  .msg-row { display: flex; gap: 10px; align-items: flex-end; margin: 6px 0; }
  .msg-row.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 13px;
    background: var(--surface2); border: 1px solid var(--border);
  }
  .msg-row.user .msg-avatar { background: var(--accent); color: #fff; border-color: transparent; }
  .msg-body { max-width: 72%; }
  .msg-bubble {
    padding: 11px 14px; border-radius: 14px 14px 14px 4px;
    background: var(--bot-bubble); color: var(--bot-text);
    font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
    border: 1px solid var(--border);
  }
  .msg-row.user .msg-bubble {
    background: var(--user-bubble); color: var(--user-text);
    border-radius: 14px 14px 4px 14px; border-color: transparent;
  }
  .msg-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; padding: 0 4px; }
  .msg-time { font-size: 11px; color: var(--text3); }
  .msg-action { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; }
  .msg-action:hover { color: var(--accent); }
  .typing-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--text3); margin-right: 3px; animation: blink 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: .2s; }
  .typing-dot:nth-child(3) { animation-delay: .4s; margin-right: 0; }
  @keyframes blink { 0%,80%,100% { opacity: .3; } 40% { opacity: 1; } }

  /* Download strip */
  .dl-strip { margin-top: 8px; padding: 8px 12px; background: var(--surface2); border-radius: var(--radius-sm); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .dl-label { font-size: 11px; color: var(--text3); }
  .dl-link { font-size: 12px; color: var(--accent); text-decoration: underline; cursor: pointer; background: none; border: none; }

  /* Alert / info banners */
  .chat-banner { margin: 0 20px 8px; padding: 8px 12px; border-radius: var(--radius-sm); font-size: 13px; }
  .chat-banner.err { background: var(--danger-bg); color: var(--danger); border: 1px solid #ffa39e; }
  .chat-banner.info { background: var(--accent-light); color: var(--accent); border: 1px solid #91caff; }

  /* Input bar */
  .input-bar {
    padding: 12px 16px; border-top: 1px solid var(--border);
    background: var(--surface); display: flex; gap: 8px; align-items: center; flex-shrink: 0;
  }
  .chat-input {
    flex: 1; padding: 11px 14px; border: 1px solid var(--border2); border-radius: 24px;
    background: var(--surface2); color: var(--text); font-size: 14px; outline: none; transition: border .15s;
    resize: none; max-height: 120px; overflow-y: auto; line-height: 1.5;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--text3); }
  .send-btn {
    width: 40px; height: 40px; border-radius: 20px; border: none; background: var(--accent);
    color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .15s;
  }
  .send-btn:hover { background: #1d3fcf; }
  .send-btn:disabled { opacity: .5; cursor: not-allowed; }
  .mic-btn {
    width: 40px; height: 40px; border-radius: 20px; border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text2); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s;
  }
  .mic-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mic-btn.active { background: var(--danger); color: #fff; border-color: transparent; }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; transform: translateX(-100%); transition: transform .25s; }
    .sidebar.open { transform: translateX(0); }
    .menu-toggle { display: flex; }
    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 99; display: none; }
    .sidebar-overlay.open { display: block; }
    .t-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* Spinner */
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent2); border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Inline rename input */
  .rename-input {
    background: var(--surface2); border: 1px solid var(--accent); border-radius: 4px;
    color: var(--text); font-size: 13px; padding: 2px 6px; width: 150px; outline: none;
  }
  .session-item .session-actions.editing { display: flex; }

  /* Progress bar for uploads */
  .upload-progress { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 6px; display: none; }
  .upload-progress.show { display: block; }
  .upload-progress-bar { height: 100%; background: var(--accent2); width: 0%; transition: width .3s; border-radius: 2px; }
</style>
</head>
<body>

<!-- Role Gate -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-logo">AQ</div>
    <div class="gate-title">Ask QUEST</div>
    <div class="gate-sub">Quaid-e-Awam University Knowledge Assistant</div>
    <div class="gate-btns">
      <button class="gate-btn" onclick="enterUser()">
        <div class="gate-btn-icon">🎓</div>
        <strong>Student / User</strong>
        <span class="gate-btn-label">Ask questions about QUEST</span>
      </button>
      <button class="gate-btn admin-btn" onclick="showAdminLogin()">
        <div class="gate-btn-icon">🔐</div>
        <strong>Admin</strong>
        <span class="gate-btn-label">Manage chatbot knowledge</span>
      </button>
    </div>
  </div>
</div>

<!-- Admin Login Modal -->
<div class="admin-login" id="adminLogin">
  <div class="al-card">
    <div class="al-title">Admin Login</div>
    <div class="al-err" id="alErr">Incorrect password. Try again.</div>
    <input type="text" class="al-input" placeholder="Username" id="alUser" />
    <input type="password" class="al-input" placeholder="Password" id="alPass"
      onkeydown="if(event.key==='Enter') doAdminLogin()" />
    <div class="al-btns">
      <button class="al-submit" onclick="doAdminLogin()">Sign In</button>
      <button class="al-cancel" onclick="closeAdminLogin()">Cancel</button>
    </div>
  </div>
</div>

<!-- Sidebar overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Main App -->
<div id="app">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="brand">
        <div class="brand-logo">AQ</div>
        <div>
          <div class="brand-name">
            Ask QUEST
            <span class="brand-role" id="roleTag">User</span>
          </div>
        </div>
      </div>
      <div class="head-actions">
        <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="Toggle theme">🌙</button>
        <button class="icon-btn" onclick="exitToGate()" title="Switch role">↩</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">Conversations</div>
      <button class="new-session-btn" onclick="createSession()">
        ＋ New conversation
      </button>
    </div>

    <div class="sessions-list" id="sessionsList"></div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel" style="display:none">
      <div class="admin-panel-title">Knowledge Base</div>

      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">

<script>
const API_BASE = 'http://121.52.154.120:3001';

let currentRole = null; // 'user' | 'admin'
let sessions = [];
let activeId = null;
let messages = [];
let isListening = false;
let recog = null;
let theme = localStorage.getItem('aq_theme') || 'light';

// ─── THEME ───
function applyTheme() {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').textContent = theme === 'light' ? '🌙' : '☀️';
  localStorage.setItem('aq_theme', theme);
}
function toggleTheme() { theme = theme === 'light' ? 'dark' : 'light'; applyTheme(); }
applyTheme();

// ─── GATE ───
function enterUser() {
  currentRole = 'user';
  launchApp();
}
function showAdminLogin() {
  document.getElementById('adminLogin').classList.add('open');
  document.getElementById('alUser').focus();
}
function closeAdminLogin() {
  document.getElementById('adminLogin').classList.remove('open');
  document.getElementById('alErr').style.display = 'none';
}
function doAdminLogin() {
  const u = document.getElementById('alUser').value.trim();
  const p = document.getElementById('alPass').value;
  // Simple client-side check — in production, verify server-side
  if (u.toLowerCase() === 'admin' && p === 'admin123') {
    currentRole = 'admin';
    closeAdminLogin();
    launchApp();
  } else {
    document.getElementById('alErr').style.display = 'block';
  }
}

function launchApp() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').classList.add('open');
  document.getElementById('roleTag').textContent = currentRole === 'admin' ? 'Admin' : 'User';
  document.getElementById('roleTag').className = 'brand-role' + (currentRole === 'admin' ? '' : ' user-role');
  if (currentRole === 'admin') {
    document.getElementById('adminPanel').style.display = 'block';
    document.getElementById('ticketToggleBtn').style.display = 'flex';
  }
  loadSessions();
}

function exitToGate() {
  document.getElementById('app').classList.remove('open');
  document.getElementById('gate').style.display = 'flex';
  currentRole = null; sessions = []; activeId = null; messages = [];
  document.getElementById('sessionsList').innerHTML = '';
  document.getElementById('chatArea').innerHTML = '';
}

// ─── SESSIONS ───
function loadSessions() {
  try { sessions = JSON.parse(localStorage.getItem('aq_sessions_' + currentRole) || '[]'); } catch { sessions = []; }
  if (!sessions.length) createSession();
  else { renderSessions(); switchSession(sessions[0].id); }
}
function saveSessions() { localStorage.setItem('aq_sessions_' + currentRole, JSON.stringify(sessions)); }

function createSession() {
  const id = 'sess_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
  const s = { id, name: 'Conversation ' + new Date().toLocaleString(), createdAt: new Date().toISOString() };
  sessions = [s, ...sessions].slice(0, 30);
  saveSessions();
  renderSessions();
  switchSession(id);
  ensureProjectServer(id, s.name).catch(() => {});
}

function switchSession(id) {
  activeId = id;
  sessionStorage.setItem('aq_active', id);
  const s = sessions.find(x => x.id === id);
  document.getElementById('topbarName').textContent = s?.name || 'Untitled';
  document.getElementById('topbarId').textContent = id;
  renderSessions();
  loadMessages(id);
  closeSidebar();
}

function deleteSession(id) {
  sessions = sessions.filter(s => s.id !== id);
  saveSessions();
  if (activeId === id) {
    if (sessions.length) switchSession(sessions[0].id);
    else createSession();
  } else renderSessions();
}

function startRename(id, currentName) {
  const item = document.querySelector(`.session-item[data-id="${id}"]`);
  if (!item) return;
  const nameEl = item.querySelector('.session-name');
  const old = nameEl.textContent;
  nameEl.innerHTML = `<input class="rename-input" value="${old}" onblur="doRename('${id}', this)" onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){this.value='';this.blur();}" />`;
  nameEl.querySelector('input').focus();
}
function doRename(id, input) {
  const val = input.value.trim();
  if (val) {
    sessions = sessions.map(s => s.id === id ? { ...s, name: val } : s);
    saveSessions();
    if (activeId === id) { document.getElementById('topbarName').textContent = val; }
    ensureProjectServer(id, val).catch(() => {});
  }
  renderSessions();
}

function renderSessions() {
  const list = document.getElementById('sessionsList');
  list.innerHTML = sessions.map(s => `
    <div class="session-item${s.id === activeId ? ' active' : ''}" data-id="${s.id}" onclick="switchSession('${s.id}')">
      <div class="session-name">${escHtml(s.name)}</div>
      <div class="session-date">${new Date(s.createdAt).toLocaleDateString()}</div>
      <div class="session-actions" onclick="event.stopPropagation()">
        <button class="s-act-btn" title="Rename" onclick="startRename('${s.id}')">✏️</button>
        <button class="s-act-btn" title="Delete" onclick="deleteSession('${s.id}')">🗑</button>
      </div>
    </div>
  `).join('');
}

// ─── MESSAGES ───
async function loadMessages(id) {
  const chatArea = document.getElementById('chatArea');
  chatArea.innerHTML = '';
  messages = [];
  try {
    const r = await fetch(`${API_BASE}/api/projects/${encodeURIComponent(id)}/chat`);
    if (r.ok) { const arr = await r.json(); if (Array.isArray(arr)) messages = arr; }
  } catch {}
  if (!messages.length) {
    try { messages = JSON.parse(sessionStorage.getItem('aq_chat_' + id) || '[]'); } catch {}
  }
  renderMessages();
}

function renderMessages() {
  const chatArea = document.getElementById('chatArea');
  if (!messages.length) {
    chatArea.innerHTML = `
      <div class="empty-state">
        <div class="empty-logo">💬</div>
        <div class="empty-title">How can I help you?</div>
        <div class="empty-sub">Ask anything about QUEST University — admissions, fees, departments, academic calendar, and more.</div>
        <div class="suggestions">
          <button class="sug-btn" onclick="sendDirect('What are the admission requirements?')">Admission requirements</button>
          <button class="sug-btn" onclick="sendDirect('Show fee structure as a table')">Fee structure</button>
          <button class="sug-btn" onclick="sendDirect('List all departments and their heads')">Departments & heads</button>
          <button class="sug-btn" onclick="sendDirect('When does the semester start?')">Semester dates</button>
        </div>
      </div>`;
    return;
  }
  const lastBot = [...messages].reverse().find(m => m.role === 'assistant' && !m._typing);
  chatArea.innerHTML = messages.map((m, i) => renderMsg(m, m === lastBot)).join('');
  chatArea.scrollTop = chatArea.scrollHeight;
}

function renderMsg(m, isLast) {
  const isUser = m.role === 'user';
  const time = m.ts ? new Date(m.ts).toLocaleTimeString() : '';
  let bubble = '';
  if (m._typing) {
    bubble = `<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>`;
  } else {
    bubble = escHtml(m.content);
  }
  const meta = !isUser && !m._typing ? `
    <div class="msg-meta">
      <span class="msg-time">${time}</span>
      <button class="msg-action" onclick="speak(${JSON.stringify(m.content)})">🔊 Speak</button>
      <button class="msg-action" onclick="copyText(${JSON.stringify(m.content)})">📋 Copy</button>
    </div>` : `<div class="msg-meta"><span class="msg-time">${time}</span></div>`;

  // Download strip for last bot message
  let dlStrip = '';
  if (isLast && m.content) {
    const tbl = parseTable(m.content);
    if (tbl) {
      dlStrip = `<div class="dl-strip"><span class="dl-label">Save table:</span>
        <button class="dl-link" onclick="dlExcel()">Download Excel</button>
        <span style="color:var(--text3)">·</span>
        <button class="dl-link" onclick="dlCSV()">Download CSV</button></div>`;
    } else if (isDoc(m.content)) {
      dlStrip = `<div class="dl-strip"><span class="dl-label">Save answer:</span>
        <button class="dl-link" onclick="dlDocx()">Download Word</button>
        <span style="color:var(--text3)">·</span>
        <button class="dl-link" onclick="dlTxt()">Download TXT</button></div>`;
    }
  }

  return `<div class="msg-row${isUser ? ' user' : ''}">
    <div class="msg-avatar">${isUser ? '🧑' : '🤖'}</div>
    <div class="msg-body">
      <div class="msg-bubble">${bubble}</div>
      ${meta}
      ${dlStrip}
    </div>
  </div>`;
}

function addMessage(m) {
  messages.push(m);
  sessionStorage.setItem('aq_chat_' + activeId, JSON.stringify(messages));
}

function persistChat() {
  sessionStorage.setItem('aq_chat_' + activeId, JSON.stringify(messages));
}

// ─── SEND ───
async function sendMsg() {
  const input = document.getElementById('chatInput');
  const q = input.value.trim();
  if (!q || document.getElementById('sendBtn').disabled) return;
  input.value = ''; autoResize(input);
  await doSend(q);
}
function sendDirect(q) { doSend(q); }

async function doSend(question) {
  document.getElementById('sendBtn').disabled = true;
  setBanner('');

  const userMsg = { role: 'user', content: question, ts: Date.now() };
  addMessage(userMsg);
  appendChatServer(activeId, userMsg).catch(() => {});

  const placeholder = { role: 'assistant', content: '', ts: Date.now(), _typing: true };
  messages.push(placeholder);
  renderMessages();

  const history = messages.slice(-12).filter(m => !m._typing).map(m => ({ role: m.role, content: m.content }));

  try {
    // Try streaming first
    const res = await fetch(`${API_BASE}/api/ask/stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, history, sessionId: activeId })
    });

    if (res.ok && res.body) {
      const reader = res.body.getReader();
      let acc = '';
      // Remove placeholder
      messages = messages.filter(m => !m._typing);
      const liveMsg = { role: 'assistant', content: '', ts: Date.now() };
      messages.push(liveMsg);

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        acc += new TextDecoder().decode(value);
        liveMsg.content = acc;
        renderMessages();
        await new Promise(r => setTimeout(r, 15));
      }
      liveMsg.content = acc || '(no answer)';
      persistChat();
      appendChatServer(activeId, liveMsg).catch(() => {});
      speak(liveMsg.content, false);
    } else {
      throw new Error('stream unavailable');
    }
  } catch {
    // Fallback to /api/ask
    try {
      const r2 = await fetch(`${API_BASE}/api/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, history, sessionId: activeId })
      });
      const data = await r2.json().catch(() => ({}));
      if (!r2.ok) throw new Error(data?.message || 'Request failed');
      const reply = data?.text || '(no answer)';
      messages = messages.filter(m => !m._typing);
      const finalMsg = { role: 'assistant', content: reply, ts: Date.now() };
      messages.push(finalMsg);
      persistChat();
      appendChatServer(activeId, finalMsg).catch(() => {});
      renderMessages();
      speak(reply, false);
    } catch (e) {
      messages = messages.filter(m => !m._typing);
      messages.push({ role: 'assistant', content: 'Sorry — something went wrong.', ts: Date.now(), error: true });
      persistChat();
      renderMessages();
      setBanner('Error: ' + (e.message || 'Unknown error'), 'err');
    }
  }
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
}

// ─── API HELPERS ───
async function ensureProjectServer(id, name) {
  await fetch(`${API_BASE}/api/projects/ensure`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sessionId: id, name: name || '' })
  });
}
async function appendChatServer(id, msg) {
  await fetch(`${API_BASE}/api/projects/${encodeURIComponent(id)}/chat/append`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(msg)
  });
}
async function clearChat() {
  messages = [];
  persistChat();
  try { await fetch(`${API_BASE}/api/projects/${encodeURIComponent(activeId)}/chat`, { method: 'DELETE' }); } catch {}
  renderMessages();
}

// ─── UPLOAD (Admin) ───
async function handleUpload(files) {
  if (!files?.length) return;
  showAdmMsg('Uploading…', 'info');
  setUploadProgress(30);
  try {
    await ensureProjectServer(activeId, sessions.find(s => s.id === activeId)?.name);
    const form = new FormData();
    Array.from(files).forEach(f => form.append('files', f));
    setUploadProgress(60);
    const r = await fetch(`${API_BASE}/api/projects/${encodeURIComponent(activeId)}/upload`, { method: 'POST', body: form });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d?.message || 'Upload failed');
    setUploadProgress(80);
    const r2 = await fetch(`${API_BASE}/api/projects/${encodeURIComponent(activeId)}/ingest`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ clear: false })
    });
    const d2 = await r2.json().catch(() => ({}));
    if (!r2.ok) throw new Error(d2?.message || 'Ingest failed');
    setUploadProgress(100);
    setTimeout(() => setUploadProgress(0), 800);
    showAdmMsg(`✅ ${files.length} file(s) uploaded & indexed.`, 'ok');
  } catch (e) {
    setUploadProgress(0);
    showAdmMsg('❌ ' + (e.message || 'Failed'), 'err');
  }
  document.getElementById('fileInput').value = '';
}

async function reindex(clear) {
  showAdmMsg('Re-indexing…', 'info');
  try {
    const r = await fetch(`${API_BASE}/api/projects/${encodeURIComponent(activeId)}/ingest`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ clear: !!clear })
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d?.message || 'Failed');
    showAdmMsg('✅ Re-index started' + (clear ? ' (cleared)' : '') + '.', 'ok');
  } catch (e) { showAdmMsg('❌ ' + e.message, 'err'); }
}

async function handleGlobalUpload(files) {
  if (!files?.length) return;
  showAdmMsg('Uploading to Global…', 'info');
  try {
    const gid = '_global';
    await ensureProjectServer(gid, 'Global Knowledge');

    const r = await fetch(`${API_BASE}/api/projects/${encodeURIComponent(gid)}/upload`, { method: 'POST', body: form });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d?.message || 'Upload failed');
    const r2 = await fetch(`${API_BASE}/api/projects/${encodeURIComponent(gid)}/ingest`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },

    });
    const d2 = await r2.json().catch(() => ({}));

  } catch (e) { showAdmMsg('❌ ' + e.message, 'err'); }

// ─── SPEECH ───
function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Speech recognition not supported in this browser.'); return; }
  if (isListening) {
    recog?.stop(); isListening = false;
    document.getElementById('micBtn').classList.remove('active');
    return;
  }
  recog = new SR();
  recog.lang = document.getElementById('langSelect').value;
  recog.interimResults = false;
  recog.onresult = (e) => {
    const t = e.results?.[0]?.[0]?.transcript || '';
    isListening = false;
    document.getElementById('micBtn').classList.remove('active');
    document.getElementById('chatInput').value = t;
    autoResize(document.getElementById('chatInput'));
    doSend(t);
  };
  recog.onerror = () => { isListening = false; document.getElementById('micBtn').classList.remove('active'); };
  recog.onend = () => { isListening = false; document.getElementById('micBtn').classList.remove('active'); };
  recog.start();
  isListening = true;
  document.getElementById('micBtn').classList.add('active');
}

function speak(text, auto = true) {
  if (!auto) return;
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.slice(0, 500));
  const lang = document.getElementById('langSelect').value;
  const v = window.speechSynthesis.getVoices().find(v => v.lang === lang);
  if (v) u.voice = v;
  window.speechSynthesis.speak(u);
}

// ─── DOWNLOADS ───
function parseTable(text) {
  if (!text?.includes('|')) return null;
  const lines = text.split(/\r?\n/).map(l => l.trim());
  for (let i = 0; i < lines.length - 1; i++) {
    if (lines[i].startsWith('|') && /^\|?(\s*:?-{3,}:?\s*\|)+/.test(lines[i+1])) {
      const hdr = lines[i].replace(/^\||\|$/g,'').split('|').map(c => c.trim());
      const rows = [];
      for (let r = i+2; r < lines.length; r++) {
        if (!lines[r].includes('|')) break;
        rows.push(lines[r].replace(/^\||\|$/g,'').split('|').map(c => c.trim()));
      }
      if (hdr.length && rows.length) return { headers: hdr, rows };
    }
  }
  return null;
}
function isDoc(text) { return text && text.length > 600 && (text.split(/\n{2,}/).length >= 3 || (text.match(/(^|\n)\s*#+\s+/g)||[]).length >= 1); }
function getLastBot() { return [...messages].reverse().find(m => m.role === 'assistant' && !m._typing); }

function dlCSV() {
  const m = getLastBot(); if (!m) return;
  const t = parseTable(m.content); if (!t) return;
  const esc = s => `"${String(s||'').replace(/"/g,'""')}"`;
  const csv = [t.headers, ...t.rows].map(r => r.map(esc).join(',')).join('\r\n');
  dlBlob(new Blob([csv], { type: 'text/csv' }), 'AskQUEST_Table.csv');
}
async function dlExcel() {
  const m = getLastBot(); if (!m) return;
  const t = parseTable(m.content); if (!t) return;
  try {
    const XLSX = await import('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm');
    const json = t.rows.map(r => { const o = {}; t.headers.forEach((h,i) => o[h]=r[i]||''); return o; });
    const ws = XLSX.utils.json_to_sheet(json, { header: t.headers });
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Data');
    XLSX.writeFile(wb, 'AskQUEST_Table.xlsx');
  } catch { dlCSV(); }
}
function dlTxt() {
  const m = getLastBot(); if (!m) return;
  dlBlob(new Blob([m.content], { type: 'text/plain' }), 'AskQUEST_Answer.txt');
}
async function dlDocx() {
  const m = getLastBot(); if (!m) return;
  try {
    const { Document, Packer, Paragraph, TextRun, HeadingLevel } = await import('https://cdn.jsdelivr.net/npm/docx@8.5.0/+esm');
    const paras = [new Paragraph({ text: 'Ask QUEST — Answer', heading: HeadingLevel.HEADING_1 }), new Paragraph('')];
    m.content.split(/\n{2,}/).forEach(block => {
      block.split('\n').forEach(line => paras.push(new Paragraph({ children: [new TextRun({ text: line })] })));
      paras.push(new Paragraph(''));
    });
    const doc = new Document({ sections: [{ properties: {}, children: paras }] });
    const blob = await Packer.toBlob(doc);
    dlBlob(blob, 'AskQUEST_Answer.docx');
  } catch { dlTxt(); }
}
function dlBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
}

// ─── UI HELPERS ───
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function copyText(t) { navigator.clipboard?.writeText(t).catch(() => {}); }
function setBanner(msg, type='') {
  const el = document.getElementById('chatBanner');
  if (!msg) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="chat-banner ${type}">${escHtml(msg)}</div>`;
}
function showAdmMsg(msg, type) {
  const el = document.getElementById('admMsg');
  el.innerHTML = `<div class="adm-msg ${type}">${msg}</div>`;
  if (type === 'ok') setTimeout(() => { if (el.querySelector('.adm-msg.ok')) el.innerHTML = ''; }, 4000);
}
function setUploadProgress(pct) {
  const p = document.getElementById('uploadProgress');
  const b = document.getElementById('uploadBar');
  if (pct > 0) { p.classList.add('show'); b.style.width = pct + '%'; }
  else { b.style.width = '0%'; setTimeout(() => p.classList.remove('show'), 400); }
}
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}
