<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AskQUEST — QUEST University Assistant</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  /* ── DESIGN TOKENS ── */
  :root {
    --bg:        #ffffff;
    --bg2:       #f9f9f9;
    --bg3:       #f0f0f0;
    --surface:   #ffffff;
    --border:    #e5e5e5;
    --border2:   #d4d4d4;
    --text:      #0a0a0a;
    --text2:     #6b6b6b;
    --text3:     #a3a3a3;
    --accent:    #2563eb;
    --accent-h:  #1d4ed8;
    --accent-bg: #eff6ff;
    --user-bg:   #2563eb;
    --user-text: #ffffff;
    --bot-bg:    #f4f4f5;
    --bot-text:  #0a0a0a;
    --danger:    #dc2626;
    --danger-bg: #fef2f2;
    --success:   #16a34a;
    --radius:    16px;
    --radius-sm: 10px;
    --radius-xs: 6px;
    --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --sidebar-w: 260px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', Consolas, monospace;
    --transition: .15s ease;
  }

  [data-theme="dark"] {
    --bg:        #0f0f0f;
    --bg2:       #161616;
    --bg3:       #1f1f1f;
    --surface:   #161616;
    --border:    #272727;
    --border2:   #383838;
    --text:      #fafafa;
    --text2:     #a1a1aa;
    --text3:     #52525b;
    --accent:    #3b82f6;
    --accent-h:  #60a5fa;
    --accent-bg: #1e3a5f;
    --user-bg:   #2563eb;
    --user-text: #ffffff;
    --bot-bg:    #1f1f1f;
    --bot-text:  #fafafa;
    --danger:    #f87171;
    --danger-bg: #2d1515;
    --success:   #4ade80;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── LAYOUT ── */
  #app { display: flex; height: 100vh; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform var(--transition);
    z-index: 100;
  }

  .sidebar-top {
    padding: 16px 12px 8px;
    flex-shrink: 0;
  }

  .new-chat-btn {
    width: 100%;
    padding: 9px 12px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background var(--transition);
  }
  .new-chat-btn:hover { background: var(--bg3); }
  .new-chat-btn svg { flex-shrink: 0; opacity: .7; }

  .sidebar-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 14px 14px 6px;
    flex-shrink: 0;
  }

  .sessions-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 6px 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }
  .sessions-list::-webkit-scrollbar { width: 4px; }
  .sessions-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .session-item {
    padding: 8px 10px;
    border-radius: var(--radius-xs);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1px;
    border: 1px solid transparent;
    transition: background var(--transition);
    position: relative;
    group: true;
  }
  .session-item:hover { background: var(--bg3); }
  .session-item.active {
    background: var(--accent-bg);
    border-color: transparent;
  }
  .session-item-text {
    flex: 1;
    min-width: 0;
  }
  .session-name {
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 400;
  }
  .session-item.active .session-name { color: var(--accent); font-weight: 500; }
  .session-date { font-size: 11px; color: var(--text3); }
  .session-del {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 14px;
    flex-shrink: 0;
  }
  .session-del:hover { color: var(--danger); background: var(--danger-bg); }
  .session-item:hover .session-del { display: flex; align-items: center; }

  .sidebar-bottom {
    padding: 12px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sidebar-footer-text {
    flex: 1;
    font-size: 12px;
    color: var(--text3);
    line-height: 1.4;
  }
  .sidebar-footer-text strong { color: var(--text2); font-weight: 500; }

  .icon-btn {
    width: 34px;
    height: 34px;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    flex-shrink: 0;
  }
  .icon-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
    background: var(--bg);
  }

  /* ── TOPBAR ── */
  .topbar {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    flex-shrink: 0;
    height: 57px;
  }

  .menu-toggle { display: none; }

  .topbar-title {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .topbar-sub {
    font-size: 11px;
    font-weight: 400;
    color: var(--text3);
    margin-left: 8px;
  }

  .topbar-right { display: flex; align-items: center; gap: 6px; }

  /* ── CHAT AREA ── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }
  .chat-area::-webkit-scrollbar { width: 5px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* ── EMPTY STATE ── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    max-width: 640px;
    margin: auto;
    width: 100%;
  }

  .empty-logo {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    font-size: 24px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -1px;
    box-shadow: 0 4px 14px rgba(37,99,235,.3);
  }

  .empty-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -.3px;
  }

  .empty-sub {
    color: var(--text2);
    font-size: 14px;
    margin-bottom: 28px;
    max-width: 380px;
    line-height: 1.7;
  }

  .suggestions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 520px;
  }

  .sug-card {
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg2);
    cursor: pointer;
    text-align: left;
    transition: all var(--transition);
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
  }
  .sug-card:hover {
    border-color: var(--accent);
    background: var(--accent-bg);
    color: var(--accent);
  }
  .sug-card-icon { font-size: 18px; margin-bottom: 6px; display: block; }
  .sug-card-text { font-weight: 500; color: var(--text); font-size: 12.5px; display: block; }

  /* ── MESSAGES ── */
  .msg-group {
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    padding: 0 20px;
  }

  .msg-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    align-items: flex-start;
  }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
  }
  .msg-row.user .msg-avatar {
    background: var(--accent);
    color: #fff;
    border-color: transparent;
    font-size: 12px;
  }

  .msg-body { max-width: calc(100% - 44px); min-width: 0; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 18px 18px 18px 4px;
    background: var(--bot-bg);
    color: var(--bot-text);
    font-size: 14.5px;
    line-height: 1.65;
    word-break: break-word;
    border: 1px solid var(--border);
  }
  .msg-row.user .msg-bubble {
    background: var(--user-bg);
    color: var(--user-text);
    border-radius: 18px 18px 4px 18px;
    border-color: transparent;
  }

  /* Markdown inside bubbles */
  .msg-bubble p { margin-bottom: 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin-bottom: 8px; }
  .msg-bubble li { margin-bottom: 3px; }
  .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
    font-size: 15px;
    font-weight: 600;
    margin: 12px 0 4px;
  }
  .msg-bubble h1:first-child, .msg-bubble h2:first-child, .msg-bubble h3:first-child { margin-top: 0; }
  .msg-bubble code {
    font-family: var(--font-mono);
    font-size: 12.5px;
    background: rgba(0,0,0,.06);
    padding: 1px 5px;
    border-radius: 4px;
  }
  .msg-row.user .msg-bubble code { background: rgba(255,255,255,.15); }
  .msg-bubble pre {
    background: #1e1e1e;
    color: #d4d4d4;
    padding: 12px 14px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 12.5px;
    margin: 8px 0;
    font-family: var(--font-mono);
    line-height: 1.5;
  }
  .msg-bubble pre code { background: none; padding: 0; color: inherit; }
  .msg-bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
  .msg-bubble th, .msg-bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .msg-bubble th { background: var(--bg3); font-weight: 600; }
  .msg-bubble blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text2); margin: 8px 0; }
  .msg-bubble a { color: var(--accent); text-decoration: underline; }
  .msg-bubble strong { font-weight: 600; }

  .msg-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
    padding: 0 2px;
    flex-wrap: wrap;
  }
  .msg-time { font-size: 11px; color: var(--text3); }
  .msg-action {
    font-size: 11px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: var(--radius-xs);
    transition: all var(--transition);
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .msg-action:hover { background: var(--bg3); color: var(--text); }
  .msg-action.copied { color: var(--success); }

  /* Typing indicator */
  .typing-dots {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 2px;
    height: 22px;
  }
  .typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text3);
    animation: bounce 1.3s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: .15s; }
  .typing-dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100%{ transform:translateY(0); } 30%{ transform:translateY(-6px); } }

  /* Download strip */
  .dl-strip {
    margin-top: 8px;
    padding: 8px 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 12px;
  }
  .dl-label { color: var(--text3); }
  .dl-btn {
    font-size: 12px;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }

  /* ── INPUT BAR ── */
  .input-wrap {
    padding: 12px 20px 16px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-box {
    max-width: 760px;
    margin: 0 auto;
    background: var(--bg2);
    border: 1.5px solid var(--border2);
    border-radius: 14px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 10px 12px;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .input-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,.1);
  }

  .chat-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-size: 14.5px;
    color: var(--text);
    font-family: var(--font);
    line-height: 1.55;
    max-height: 160px;
    overflow-y: auto;
    scrollbar-width: thin;
  }
  .chat-input::placeholder { color: var(--text3); }

  .input-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }

  .mic-btn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    flex-shrink: 0;
  }
  .mic-btn:hover { background: var(--bg3); color: var(--text); }
  .mic-btn.active {
    background: #fef2f2;
    border-color: var(--danger);
    color: var(--danger);
  }
  [data-theme="dark"] .mic-btn.active { background: var(--danger-bg); }

  .send-btn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background var(--transition), opacity var(--transition);
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--accent-h); }
  .send-btn:disabled { opacity: .4; cursor: not-allowed; }

  .input-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    margin-top: 8px;
  }

  /* ── VOICE STATUS ── */
  .voice-status {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 6px 0 2px;
    font-size: 12px;
    color: var(--danger);
    font-weight: 500;
  }
  .voice-status.show { display: flex; }
  .voice-pulse {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--danger);
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:.5; transform:scale(1.3); } }

  /* ── BANNER ── */
  #chatBanner { max-width: 760px; margin: 0 auto; padding: 0 20px; }
  .chat-banner {
    padding: 8px 14px;
    border-radius: var(--radius-xs);
    font-size: 13px;
    margin-bottom: 8px;
  }
  .chat-banner.err { background: var(--danger-bg); color: var(--danger); border: 1px solid currentColor; }

  /* ── LANG SELECT ── */
  .lang-select {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    background: var(--bg2);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    outline: none;
    font-family: var(--font);
  }

  /* ── OVERLAY ── */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 99;
    backdrop-filter: blur(2px);
  }
  .sidebar-overlay.open { display: block; }

  /* ── SPEAKING INDICATOR ── */
  .speaking-badge {
    display: none;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--accent);
    padding: 3px 8px;
    background: var(--accent-bg);
    border-radius: 20px;
    font-weight: 500;
  }
  .speaking-badge.show { display: flex; }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      transform: translateX(-100%);
      box-shadow: 4px 0 20px rgba(0,0,0,.15);
    }
    .sidebar.open { transform: translateX(0); }
    .menu-toggle { display: flex !important; }
    .suggestions { grid-template-columns: 1fr; }
    .topbar { padding: 10px 14px; }
    .input-wrap { padding: 8px 12px 12px; }
    .msg-group { padding: 0 14px; }
    .chat-area { padding: 16px 0; }
  }

  /* ── SCROLL TO BOTTOM BTN ── */
  .scroll-btn {
    position: fixed;
    bottom: 100px;
    right: 24px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text2);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow);
    z-index: 50;
    transition: all var(--transition);
  }
  .scroll-btn:hover { background: var(--bg3); color: var(--text); }
  .scroll-btn.show { display: flex; }
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div id="app">

  <!-- ── SIDEBAR ── -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <button class="new-chat-btn" onclick="createSession()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        New conversation
      </button>
    </div>

    <div class="sidebar-label">Recents</div>
    <div class="sessions-list" id="sessionsList"></div>

    <div class="sidebar-bottom">
      <div class="sidebar-footer-text">
        <strong>AskQUEST</strong><br>QUEST University AI
      </div>
      <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="Toggle theme">
        <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>

  <!-- ── MAIN ── -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <button class="icon-btn menu-toggle" id="menuToggle" onclick="openSidebar()" style="display:none" title="Menu">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title" id="topbarTitle">
        AskQUEST
        <span class="topbar-sub" id="topbarSub"></span>
      </div>
      <div class="topbar-right">
        <span class="speaking-badge" id="speakingBadge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          Speaking…
        </span>
        <select class="lang-select" id="langSelect" title="Voice language">
          <option value="en-US">🇺🇸 English</option>
          <option value="en-GB">🇬🇧 English UK</option>
          <option value="ur-PK">🇵🇰 اردو</option>
        </select>
        <button class="icon-btn" onclick="clearChat()" title="Clear conversation">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-area" id="chatArea"></div>

    <div id="chatBanner"></div>

    <!-- Input -->
    <div class="input-wrap">
      <div class="voice-status" id="voiceStatus">
        <div class="voice-pulse"></div>
        Listening… speak now
      </div>
      <div class="input-box">
        <textarea
          class="chat-input"
          id="chatInput"
          placeholder="Ask anything about QUEST University…"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <div class="input-actions">
          <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Voice input">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <button class="send-btn" id="sendBtn" onclick="sendMsg()" title="Send (Enter)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
        </div>
      </div>
      <div class="input-hint">AskQUEST can make mistakes. Verify important information.</div>
    </div>
  </div>
</div>

<!-- Scroll to bottom -->
<button class="scroll-btn" id="scrollBtn" onclick="scrollToBottom()" title="Scroll to bottom">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
</button>

<script>
// ── CONFIG ──
const API_BASE = 'https://broad-glade-d7f9.shakeel-ahmed.workers.dev';

// ── STATE ──
let sessions = [];
let activeId = null;
let messages = [];
let isListening = false;
let isSpeaking = false;
let recog = null;
let theme = localStorage.getItem('aq_theme') || 'light';

// ── MARKED SETUP ──
if (window.marked) {
  marked.setOptions({
    breaks: true,
    gfm: true,
  });
}

function renderMarkdown(text) {
  if (!window.marked) return escHtml(text);
  try {
    return marked.parse(text || '');
  } catch {
    return escHtml(text);
  }
}

// ── THEME ──
function applyTheme() {
  document.documentElement.setAttribute('data-theme', theme);
  const icon = document.getElementById('themeIcon');
  if (theme === 'dark') {
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  } else {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  }
  localStorage.setItem('aq_theme', theme);
}
function toggleTheme() { theme = theme === 'light' ? 'dark' : 'light'; applyTheme(); }
applyTheme();

// ── SESSIONS ──
function loadSessions() {
  try { sessions = JSON.parse(localStorage.getItem('aq_sessions') || '[]'); } catch { sessions = []; }
  if (!sessions.length) createSession();
  else { renderSessions(); switchSession(sessions[0].id); }
}

function saveSessions() {
  localStorage.setItem('aq_sessions', JSON.stringify(sessions));
}

function createSession() {
  const id = 'sess_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
  const s = { id, name: 'New conversation', createdAt: new Date().toISOString() };
  sessions = [s, ...sessions].slice(0, 40);
  saveSessions();
  renderSessions();
  switchSession(id);
  ensureProjectServer(id, s.name).catch(() => {});
}

function switchSession(id) {
  activeId = id;
  const s = sessions.find(x => x.id === id);
  document.getElementById('topbarTitle').innerHTML =
    escHtml(s?.name || 'AskQUEST') +
    `<span class="topbar-sub" id="topbarSub"></span>`;
  renderSessions();
  loadMessages(id);
  closeSidebar();
}

function deleteSession(id, e) {
  e.stopPropagation();
  sessions = sessions.filter(s => s.id !== id);
  saveSessions();
  if (activeId === id) {
    if (sessions.length) switchSession(sessions[0].id);
    else createSession();
  } else renderSessions();
}

function updateSessionName(id, firstMsg) {
  const name = firstMsg.length > 40 ? firstMsg.slice(0, 40) + '…' : firstMsg;
  sessions = sessions.map(s => s.id === id ? { ...s, name } : s);
  saveSessions();
  renderSessions();
  const t = document.getElementById('topbarTitle');
  if (t) t.innerHTML = escHtml(name) + `<span class="topbar-sub" id="topbarSub"></span>`;
}

function renderSessions() {
  const list = document.getElementById('sessionsList');
  if (!sessions.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:12px;padding:24px 12px">No conversations yet</div>';
    return;
  }
  list.innerHTML = sessions.map(s => `
    <div class="session-item${s.id === activeId ? ' active' : ''}" onclick="switchSession('${s.id}')">
      <div class="session-item-text">
        <div class="session-name">${escHtml(s.name)}</div>
        <div class="session-date">${relativeTime(s.createdAt)}</div>
      </div>
      <button class="session-del" onclick="deleteSession('${s.id}', event)" title="Delete">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  `).join('');
}

function relativeTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return d.toLocaleDateString();
}

// ── MESSAGES ──
async function loadMessages(id) {
  const chatArea = document.getElementById('chatArea');
  chatArea.innerHTML = '';
  messages = [];
  try {
    const r = await fetch(`${API_BASE}/api/projects/${encodeURIComponent(id)}/chat`);
    if (r.ok) { const arr = await r.json(); if (Array.isArray(arr)) messages = arr; }
  } catch {}
  if (!messages.length) {
    try { messages = JSON.parse(sessionStorage.getItem('aq_chat_' + id) || '[]'); } catch {}
  }
  renderMessages();
}

function renderMessages() {
  const chatArea = document.getElementById('chatArea');
  if (!messages.length) {
    chatArea.innerHTML = `
      <div class="empty-state">
        <div class="empty-logo">AQ</div>
        <div class="empty-title">How can I help you?</div>
        <div class="empty-sub">Ask anything about QUEST University — admissions, programs, fees, departments, academic calendar, and more.</div>
        <div class="suggestions">
          <button class="sug-card" onclick="sendDirect('What are the admission requirements for undergraduate programs?')">
            <span class="sug-card-icon">🎓</span>
            <span class="sug-card-text">Admission requirements</span>
            Undergraduate entry criteria
          </button>
          <button class="sug-card" onclick="sendDirect('Show me the complete fee structure as a table')">
            <span class="sug-card-icon">💰</span>
            <span class="sug-card-text">Fee structure</span>
            Semester and program fees
          </button>
          <button class="sug-card" onclick="sendDirect('List all departments and their heads')">
            <span class="sug-card-icon">🏛️</span>
            <span class="sug-card-text">Departments & faculty</span>
            All academic departments
          </button>
          <button class="sug-card" onclick="sendDirect('When does the next semester start? What is the academic calendar?')">
            <span class="sug-card-icon">📅</span>
            <span class="sug-card-text">Academic calendar</span>
            Semester dates & schedule
          </button>
        </div>
      </div>`;
    return;
  }

  const lastBotIdx = [...messages].map((m,i) => ({m,i})).reverse().find(x => x.m.role === 'assistant' && !x.m._typing)?.i;

  chatArea.innerHTML = `<div class="msg-group">${messages.map((m, i) => renderMsg(m, i === lastBotIdx)).join('')}</div>`;
  scrollToBottom();
}

function renderMsg(m, isLast) {
  const isUser = m.role === 'user';
  const time = m.ts ? new Date(m.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';

  let bubbleContent = '';
  if (m._typing) {
    bubbleContent = `<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  } else if (isUser) {
    bubbleContent = escHtml(m.content);
  } else {
    bubbleContent = renderMarkdown(m.content);
  }

  const avatarContent = isUser
    ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`
    : 'AQ';

  let meta = '';
  if (!isUser && !m._typing) {
    meta = `<div class="msg-meta">
      <span class="msg-time">${time}</span>
      <button class="msg-action" onclick="copyMsg(this, ${JSON.stringify(m.content)})">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy
      </button>
      <button class="msg-action" onclick="speakText(${JSON.stringify(m.content)})">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        Read aloud
      </button>
    </div>`;
  } else if (isUser) {
    meta = `<div class="msg-meta"><span class="msg-time">${time}</span></div>`;
  }

  let dlStrip = '';
  if (isLast && m.content) {
    const tbl = parseTable(m.content);
    if (tbl) {
      dlStrip = `<div class="dl-strip">
        <span class="dl-label">Save table:</span>
        <button class="dl-btn" onclick="dlExcel()">Excel</button>
        <span style="color:var(--text3)">·</span>
        <button class="dl-btn" onclick="dlCSV()">CSV</button>
      </div>`;
    } else if (isLongDoc(m.content)) {
      dlStrip = `<div class="dl-strip">
        <span class="dl-label">Save answer:</span>
        <button class="dl-btn" onclick="dlTxt()">Text file</button>
      </div>`;
    }
  }

  return `<div class="msg-row${isUser ? ' user' : ''}">
    <div class="msg-avatar">${avatarContent}</div>
    <div class="msg-body">
      <div class="msg-bubble">${bubbleContent}</div>
      ${meta}
      ${dlStrip}
    </div>
  </div>`;
}

function addMessage(m) {
  messages.push(m);
  sessionStorage.setItem('aq_chat_' + activeId, JSON.stringify(messages));
}
function persistChat() {
  sessionStorage.setItem('aq_chat_' + activeId, JSON.stringify(messages));
}

// ── SEND ──
async function sendMsg() {
  const input = document.getElementById('chatInput');
  const q = input.value.trim();
  if (!q || document.getElementById('sendBtn').disabled) return;
  input.value = '';
  autoResize(input);
  await doSend(q);
}

function sendDirect(q) { doSend(q); }

async function doSend(question) {
  document.getElementById('sendBtn').disabled = true;
  setBanner('');
  stopSpeaking();

  const userMsg = { role: 'user', content: question, ts: Date.now() };
  addMessage(userMsg);

  // Auto-name session from first user message
  const s = sessions.find(x => x.id === activeId);
  if (s && s.name === 'New conversation') updateSessionName(activeId, question);

  appendChatServer(activeId, userMsg).catch(() => {});

  const placeholder = { role: 'assistant', content: '', ts: Date.now(), _typing: true };
  messages.push(placeholder);
  renderMessages();

  const history = messages.slice(-14).filter(m => !m._typing).map(m => ({ role: m.role, content: m.content }));

  try {
    const res = await fetch(`${API_BASE}/api/ask/stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, history, sessionId: activeId })
    });

    if (res.ok && res.body) {
      const reader = res.body.getReader();
      let acc = '';
      messages = messages.filter(m => !m._typing);
      const liveMsg = { role: 'assistant', content: '', ts: Date.now() };
      messages.push(liveMsg);

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        acc += new TextDecoder().decode(value);
        liveMsg.content = acc;
        renderMessages();
        await new Promise(r => setTimeout(r, 16));
      }

      liveMsg.content = acc || '(no answer)';
      persistChat();
      appendChatServer(activeId, liveMsg).catch(() => {});
    } else {
      throw new Error('stream unavailable');
    }
  } catch {
    try {
      const r2 = await fetch(`${API_BASE}/api/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, history, sessionId: activeId })
      });
      const data = await r2.json().catch(() => ({}));
      if (!r2.ok) throw new Error(data?.message || 'Request failed');
      const reply = data?.text || '(no answer)';
      messages = messages.filter(m => !m._typing);
      const finalMsg = { role: 'assistant', content: reply, ts: Date.now() };
      messages.push(finalMsg);
      persistChat();
      appendChatServer(activeId, finalMsg).catch(() => {});
      renderMessages();
    } catch (e) {
      messages = messages.filter(m => !m._typing);
      messages.push({ role: 'assistant', content: 'Something went wrong. Please try again.', ts: Date.now() });
      persistChat();
      renderMessages();
      setBanner('Error: ' + (e.message || 'Unknown'), 'err');
    }
  }

  document.getElementById('sendBtn').disabled = false;
  scrollToBottom();
}

// ── API HELPERS ──
async function ensureProjectServer(id, name) {
  await fetch(`${API_BASE}/api/projects/ensure`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sessionId: id, name: name || '' })
  }).catch(() => {});
}
async function appendChatServer(id, msg) {
  await fetch(`${API_BASE}/api/projects/${encodeURIComponent(id)}/chat/append`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(msg)
  }).catch(() => {});
}
async function clearChat() {
  messages = [];
  persistChat();
  try { await fetch(`${API_BASE}/api/projects/${encodeURIComponent(activeId)}/chat`, { method: 'DELETE' }); } catch {}
  renderMessages();
}

// ── VOICE INPUT ──
function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Voice input not supported in this browser. Try Chrome.'); return; }

  if (isListening) {
    recog?.stop();
    setListening(false);
    return;
  }

  recog = new SR();
  recog.lang = document.getElementById('langSelect').value;
  recog.interimResults = false;
  recog.continuous = false;

  recog.onresult = (e) => {
    const t = e.results?.[0]?.[0]?.transcript || '';
    setListening(false);
    if (t) {
      document.getElementById('chatInput').value = t;
      autoResize(document.getElementById('chatInput'));
      doSend(t);
    }
  };
  recog.onerror = () => setListening(false);
  recog.onend = () => setListening(false);
  recog.start();
  setListening(true);
}

function setListening(val) {
  isListening = val;
  document.getElementById('micBtn').classList.toggle('active', val);
  document.getElementById('voiceStatus').classList.toggle('show', val);
}

// ── VOICE OUTPUT ──
function speakText(text) {
  if (!('speechSynthesis' in window)) return;
  stopSpeaking();
  const u = new SpeechSynthesisUtterance(text.slice(0, 600));
  const lang = document.getElementById('langSelect').value;
  const voices = window.speechSynthesis.getVoices();
  const v = voices.find(v => v.lang === lang) || voices.find(v => v.lang.startsWith(lang.split('-')[0]));
  if (v) u.voice = v;
  u.onstart = () => {
    isSpeaking = true;
    document.getElementById('speakingBadge').classList.add('show');
  };
  u.onend = u.onerror = () => {
    isSpeaking = false;
    document.getElementById('speakingBadge').classList.remove('show');
  };
  window.speechSynthesis.speak(u);
}

function stopSpeaking() {
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  isSpeaking = false;
  document.getElementById('speakingBadge').classList.remove('show');
}

// ── DOWNLOADS ──
function parseTable(text) {
  if (!text?.includes('|')) return null;
  const lines = text.split(/\r?\n/).map(l => l.trim());
  for (let i = 0; i < lines.length - 1; i++) {
    if (lines[i].startsWith('|') && /^\|?(\s*:?-{3,}:?\s*\|)+/.test(lines[i+1])) {
      const hdr = lines[i].replace(/^\||\|$/g,'').split('|').map(c => c.trim());
      const rows = [];
      for (let r = i+2; r < lines.length; r++) {
        if (!lines[r].includes('|')) break;
        rows.push(lines[r].replace(/^\||\|$/g,'').split('|').map(c => c.trim()));
      }
      if (hdr.length && rows.length) return { headers: hdr, rows };
    }
  }
  return null;
}
function isLongDoc(text) { return text && text.length > 700; }
function getLastBot() { return [...messages].reverse().find(m => m.role === 'assistant' && !m._typing); }

function dlCSV() {
  const m = getLastBot(); if (!m) return;
  const t = parseTable(m.content); if (!t) return;
  const esc = s => `"${String(s||'').replace(/"/g,'""')}"`;
  const csv = [t.headers, ...t.rows].map(r => r.map(esc).join(',')).join('\r\n');
  dlBlob(new Blob([csv], { type: 'text/csv' }), 'AskQUEST_Table.csv');
}
async function dlExcel() {
  const m = getLastBot(); if (!m) return;
  const t = parseTable(m.content); if (!t) return;
  try {
    const XLSX = await import('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm');
    const json = t.rows.map(r => { const o = {}; t.headers.forEach((h,i) => o[h]=r[i]||''); return o; });
    const ws = XLSX.utils.json_to_sheet(json, { header: t.headers });
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Data');
    XLSX.writeFile(wb, 'AskQUEST_Table.xlsx');
  } catch { dlCSV(); }
}
function dlTxt() {
  const m = getLastBot(); if (!m) return;
  dlBlob(new Blob([m.content], { type: 'text/plain' }), 'AskQUEST_Answer.txt');
}
function dlBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
}

// ── UI HELPERS ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function copyMsg(btn, text) {
  navigator.clipboard?.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Copied`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
    }, 2000);
  }).catch(() => {});
}
function setBanner(msg, type='') {
  const el = document.getElementById('chatBanner');
  if (!msg) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="chat-banner ${type}">${escHtml(msg)}</div>`;
}
function scrollToBottom() {
  const ca = document.getElementById('chatArea');
  ca.scrollTop = ca.scrollHeight;
}
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

// Scroll to bottom button
document.getElementById('chatArea').addEventListener('scroll', () => {
  const ca = document.getElementById('chatArea');
  const atBottom = ca.scrollHeight - ca.scrollTop - ca.clientHeight < 80;
  document.getElementById('scrollBtn').classList.toggle('show', !atBottom && ca.scrollHeight > ca.clientHeight + 200);
});

// Mobile: show menu toggle
if (window.innerWidth <= 768) {
  document.getElementById('menuToggle').style.display = 'flex';
}
window.addEventListener('resize', () => {
  const toggle = document.getElementById('menuToggle');
  toggle.style.display = window.innerWidth <= 768 ? 'flex' : 'none';
  if (window.innerWidth > 768) closeSidebar();
});

// ── INIT ──
loadSessions();
</script>
